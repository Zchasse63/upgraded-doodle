# Supabase local-dev configuration for tsg-cc-bridge.
# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "tsg-cc-bridge"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
# We do not use Supabase Auth in the middleware — the only client of this DB
# is the Edge Function, which uses the service-role key. Authentication on
# inbound webhooks is via PushPress's HMAC signature, not Supabase Auth.
enabled = false

[edge_runtime]
enabled = true
ip_version = "ipv4"
# Single shared function policy. Each function declares its own per_worker
# request limit when needed.
policy = "oneshot"

[functions.pushpress-webhook]
# Webhook endpoint must be reachable without a Supabase JWT — PushPress
# only sends its own `webhook-signature` header. Set `verify_jwt = false`
# so the function accepts unauthenticated POSTs; we verify the HMAC
# signature inside the handler.
verify_jwt = false

[functions.reconcile-cron]
# Scheduled safety-net audit. Bearer-token auth via CRON_SECRET inside the
# function (no JWT). Runs daily at 6 AM UTC, posts a Slack summary if gaps
# are detected. Schedule is interpreted by Supabase's pg_cron-backed
# scheduler; can also be invoked manually via curl.
verify_jwt = false
schedule = "0 6 * * *"

[functions.groupon-rotate-cron]
# Groupon discount rotation. Detects which uploaded codes have been
# redeemed (= disappeared from Glofox), marks them 'used' in the
# groupon_codes table, and uploads the next queued codes to refill each
# campaign to 43. Uses the Glofox dashboard internal API via a Bearer JWT
# (GLOFOX_DASHBOARD_JWT) that expires every 24h — user must refresh via
# scripts/update-glofox-jwt.ts. CRON_SECRET-protected like reconcile-cron.
# Daily at 13:00 UTC (= 9 AM EDT, 8 AM EST) — a few hours after the user's
# typical JWT refresh in the morning. Adjust if needed.
verify_jwt = false
schedule = "0 13 * * *"

[analytics]
enabled = false
